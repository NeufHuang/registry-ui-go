services:
  registry-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: registry-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DEPLOY_MODE: "ui"
      SERVER_ADDR: ":8080"
      AUTH_MODE: "basic"
      V2_AUTH_MODE: "ui"
      REGISTRY_URL: "http://registry:5000"
      ENABLE_DELETE: "true"
      DATA_DIR: "/data"
      SQLITE_PATH: "/data/db/registry-ui.db"
      UPLOAD_DIR: "/data/uploads"
      CERT_DIR: "/data/certs"
      REGISTRY_DATA_DIR: "/data/registry"
    volumes:
      - ./data:/data
    depends_on:
      - registry

  registry:
    image: registry:3
    container_name: registry-ui-registry
    restart: unless-stopped
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - ./data/registry:/var/lib/registry
