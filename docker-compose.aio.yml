# All-in-one deployment: Registry UI + Registry v3 in one container.
# Useful for small/self-hosted installs with minimal moving parts.
services:
  registry-ui-aio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: registry-ui-aio
    restart: unless-stopped
    ports:
      - "8080:8080"
      # Optional direct registry port for debugging; Docker CLI can normally use :8080 via /v2 proxy.
      # - "5000:5000"
    environment:
      DEPLOY_MODE: "aio"
      SERVER_ADDR: ":8080"
      AUTH_MODE: "basic"
      V2_AUTH_MODE: "ui"
      REGISTRY_URL: "http://127.0.0.1:5000"
      ENABLE_DELETE: "true"
      DATA_DIR: "/data"
      SQLITE_PATH: "/data/db/registry-ui.db"
      UPLOAD_DIR: "/data/uploads"
      CERT_DIR: "/data/certs"
      REGISTRY_DATA_DIR: "/data/registry"
      REGISTRY_CONFIG: "/etc/distribution/config.yml"
    volumes:
      - ./data:/data
