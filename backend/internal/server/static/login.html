<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - Registry UI</title>
    <link rel="icon" href="/uploads/logo.png" />
    <link rel="stylesheet" href="/base.css" />
    <style>
      .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        position: relative;
      }
      .login-bg {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        opacity: 0.15;
        z-index: 0;
      }
      .login-card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 400px;
        padding: 32px;
        margin: 20px;
        background: var(--panel);
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
      .login-header {
        text-align: center;
        margin-bottom: 32px;
      }
      .login-header h1 {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--text);
      }
      .login-header p {
        color: var(--muted);
        font-size: 14px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
      }
      .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--input);
        color: var(--text);
        font-size: 14px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .form-group input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent);
      }
      .login-btn {
        width: 100%;
        padding: 12px 16px;
        background: var(--accent);
        color: white;
        border: 1px solid var(--accent);
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
      }
      .login-btn:hover {
        background: color-mix(in srgb, var(--accent) 80%, black);
        border-color: color-mix(in srgb, var(--accent) 80%, black);
      }
      .login-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .error-message {
        color: #ff5c70;
        font-size: 13px;
        margin-top: 8px;
        text-align: center;
        display: none;
      }
      .error-message.show {
        display: block;
      }
      .theme-toggle {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 8px 12px;
        background: var(--panel);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        color: var(--text-color);
        cursor: pointer;
        font-size: 14px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div class="login-page">
      <div class="login-bg" id="loginBg"></div>
      <button class="theme-toggle" id="themeToggle">☀️</button>
      <div class="login-card">
        <div class="login-header">
          <h1>Registry UI</h1>
          <p>请登录以继续</p>
        </div>
        <form id="loginForm">
          <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" required autofocus autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="login-btn" id="loginBtn">登录</button>
          <div class="error-message" id="errorMsg"></div>
        </form>
      </div>
    </div>

    <script>
      // Theme handling
      function applyTheme() {
        const theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.dataset.theme = theme;
        document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
      }
      applyTheme();
      document.getElementById('themeToggle').onclick = () => {
        const current = document.documentElement.dataset.theme;
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = next;
        localStorage.setItem('theme', next);
        document.getElementById('themeToggle').textContent = next === 'dark' ? '☀️' : '🌙';
      };

      // Try to load custom background
      fetch('/uploads/login-bg.jpg')
        .then(res => {
          if (res.ok) {
            document.getElementById('loginBg').style.backgroundImage = 'url(/uploads/login-bg.jpg)';
          }
        })
        .catch(() => {
          // Fallback - no custom background
        });

      // Login form handling
      document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const errorEl = document.getElementById('errorMsg');
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        btn.disabled = true;
        btn.textContent = '登录中...';
        errorEl.classList.remove('show');

        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });

          if (res.ok) {
            window.location.href = '/';
          } else {
            const data = await res.json().catch(() => ({}));
            errorEl.textContent = data.error || '登录失败，请检查用户名和密码';
            errorEl.classList.add('show');
          }
        } catch (err) {
          errorEl.textContent = '网络错误，请重试';
          errorEl.classList.add('show');
        } finally {
          btn.disabled = false;
          btn.textContent = '登录';
        }
      };
    </script>
  </body>
</html>
